<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Changer</title>
    <link href="02_Style.css" rel="stylesheet" />
  </head>
  <body>
    <nav>
      <a href="/" class="active">Home</a>
      <a href="https://leetcode.com/u/ItsKartik1234/" target="_blank"
        >My LeetCode Profile</a
      >
    </nav>

    <div class="canvas">
      <h1>Color Scheme Switcher</h1>
      <div class="button-container">
        <span class="button" style="background-color: #ef0000" id="red"
          >Red</span
        >
        <span class="button" style="background-color: #00ef00" id="green"
          >Green</span
        >
        <span class="button" style="background-color: #0000ef" id="blue"
          >Blue</span
        >
        <span class="button" style="background-color: #efef00" id="yellow"
          >Yellow</span
        >
      </div>
      <h2>
        Try clicking on one of the colors above
        <span>to change the background color of this page!</span>
      </h2>
    </div>

    <script src="03_Script.js"></script>
  </body>
</html>
