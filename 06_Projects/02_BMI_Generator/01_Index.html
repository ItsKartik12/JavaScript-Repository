<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="02_Style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="/" target="_main" class="active">Home</a>
      <a
        href="https://leetcode.com/u/ItsKartik1234/"
        target="_blank"
        class="active"
      >
        My LeetCode Profile
      </a>
    </nav>

    <main id="Canvas">
      <header>
        <h1 id="head">BMI Calculator</h1>
      </header>

      <form id="bmi-form">
        <div class="input-group">
          <label for="height">Height (cm):</label>
          <input
            type="number"
            id="height"
            step="0.1"
            placeholder="e.g. 175"
            required
          />
        </div>

        <div class="input-group">
          <label for="weight">Weight (kg):</label>
          <input
            type="number"
            id="weight"
            step="0.1"
            placeholder="e.g. 70"
            required
          />
        </div>

        <button type="submit" id="calculate">Calculate BMI</button>

        <output id="result"></output>

        <section id="weight-guide">
          <h3>BMI Weight Guide</h3>
          <ul>
            <li><strong>Underweight:</strong> Less than 18.6</li>
            <li><strong>Normal Range:</strong> 18.6 - 24.9</li>
            <li><strong>Overweight:</strong> 25 - 29.9</li>
            <li><strong>Obese:</strong> Greater than 30</li>
          </ul>
        </section>
      </form>
    </main>

    <script src="03_Script.js"></script>
  </body>
</html>
