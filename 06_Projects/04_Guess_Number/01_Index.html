<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess The Number | Kartik Goyal</title>
    <link rel="stylesheet" href="02_Style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="/" class="active">Home</a>
      <a href="https://leetcode.com/u/ItsKartik1234/" target="_blank"
        >LeetCode Profile</a
      >
    </nav>

    <main class="game-container">
      <form id="game-form">
        <h1>Number Guessing Game</h1>
        <p id="guess">Guess a number between 1 and 100.</p>
        <p id="attempt">You have <strong>10 attempts</strong> to win!</p>

        <div class="input-section">
          <label for="Guess" id="GuessLabel">Your Guess:</label>
          <input
            type="number"
            min="1"
            max="100"
            id="Guess"
            class="guesses"
            placeholder="Enter number"
            required
          />
          <button type="submit" id="submit">Submit Guess</button>
        </div>

        <div class="resultParas">
          <p>Previous Guesses: <span id="PreviousGuess"></span></p>
          <p>Guesses Remaining: <span id="GuessRemaining">10</span></p>
          <div class="feedback">
            <p id="lowOrHi"></p>
            <p id="lowOrHii"></p>
          </div>
        </div>
      </form>
    </main>

    <script src="03_Script.js"></script>
  </body>
</html>
