  >
    <h2>Amazing Images</h2>

    <ul id="Images">
      <li>
        <img
          width="200px"

          alt="Milestone marker on a path"
          id="milestone"
          class="photo"
        />
      </li>
      <li>
        <img
          width="200px"
          src="https://images.pexels.com/photos/19364657/pexels-photo-19364657.jpeg"

          class="photo"
        />
      </li>
      <li>

          src="https://images.pexels.com/photos/30680965/pexels-photo-30680965.jpeg"

          id="rivers"
          class="photo"
        />
      </li>
      <li>
        <img
          width="200px"
          src="https://images.pexels.com/photos/33572895/pexels-photo-33572895.jpeg"
          alt="Modern workspace setup"
          id="workspace"
          class="photo"
        />
      </li>
      <li>
        <img
          width="200px"
          src="https://images.pexels.com/photos/7517594/pexels-photo-7517594.jpeg"
          alt="Unique wildcard imagery"
          id="wildcard"
          class="photo"
        />
      </li>
      <li>
        <a
          style="color: aliceblue; text-decoration: none; font-weight: bold"
          href="https://www.google.com/"
          id="GOOGLE"
          >Google</a
        >
      </li>
    </ul>
  </body>

    document.querySelector("#Images").addEventListener("click", function (e) {
      console.log(e.target.tagName);
      if (e.target.tagName === "IMG") {
        let removeit = e.target.parentNode;
        removeit.remove();
      }
